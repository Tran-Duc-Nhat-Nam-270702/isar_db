name: isar_db
description: Fast, fully async NoSQL database for Flutter. Community-maintained fork of Isar with enhanced features and updated dependencies.
version: 1.0.1+1
repository: https://github.com/usamasarwar/isar_db
homepage: https://github.com/usamasarwar/isar_db
issue_tracker: https://github.com/usamasarwar/isar_db/issues
documentation: https://github.com/usamasarwar/isar_db
topics:
  - database
  - isar
  - nosql
  - local-storage
  - local-db

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  analyzer: ^9.0.0
  build: ^4.0.5
  ffi: ^2.1.1
  meta: ^1.16.0
  source_gen: ^4.2.2
  web: ^1.1.0

dev_dependencies:
  build_runner: ^2.4.11
  build_test: ^3.5.12
  ffigen: ^20.1.1
  test: ^1.25.8
  very_good_analysis: ^10.2.0
